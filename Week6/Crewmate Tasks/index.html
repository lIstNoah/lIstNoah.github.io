<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crewmate Task Console</title>
    <link rel="stylesheet" href="styles.css">
</head>

<!--An Among Us Inspired Checklist-->
<body>

<section id="welcomeScreen" class="screen">
    <h1>Welcome Crewmate</h1>
    <p>Enter Only 5 tasks for the day</p>

    <div class="task-input">
        <input type="text" id="taskInput" placeholder="Enter task...">
        <button id="addTaskBtn">Add Task</button>
    </div>

    <ul id="taskPreviewList"></ul>

    <button id="startTasksBtn" disabled>
        Submit 5 Tasks
    </button>
</section>

<section id="taskScreen" class="screen hidden">

    <h1>Mission Board</h1>

    <div id="taskContainer"></div>

    <div class="progress-section">
        <div class="progress-bar-bg">
            <div id="mainProgressBar"></div>
        </div>
        <p id="progressText">0%</p>
    </div>

    <button id="completeTasksBtn" disabled>
        Submit Completed Tasks
    </button>

    <p id="errorMsg" class="error"></p>

</section>

<section id="completeScreen" class="screen hidden">
    <h1>TASKS COMPLETE</h1>
</section>

<script src="script.js"></script>
</body>
</html>
