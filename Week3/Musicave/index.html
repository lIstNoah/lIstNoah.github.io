<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MUSICAVE</title>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap');
        </style>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>Musicave</header>
        <img src="vinyl.png" alt="vinyl" class="vinyl">
        <div class="title">Welcome to Musicave</div>
        <div class="learMore">
            <h1>You are here for<span class="dots"></span></h1>
            <div class="cards">
                <div id="artists">
                    <img src="cyberpunk_dj.avif" alt="cyberpunkDJ">
                    <h3>ARTISTS</h3>
                    <p>Check out our featured artists</p>
                </div>
                <div id="aboutUs">
                    <h3>ABOUT US</h3>
                </div>
                <div id="signUp">
                    <h3>SIGN UP</h3>
                    <p>Sign up as a new artist</p>
                </div>
                <a href="video.html">
                    <div id="song-of-the-day">
                        <h3>SONG OF THE MONTH</h3>
                        <p>"halcyon" by criticaleye</p>
                    </div>
                </a>
                <a href="https://open.spotify.com/" target="_blank" class="cardButton">
                    <div id="spotify">
                        <h3>SPOTIFY</h3>
                    </div>
                </a>
            </div>
        </div>
    </body>
    <footer>
            <h2>CONTACT US</h2>
            <h3>XXX@MUSICAVE.COM</h3>
    </footer>
</html>
