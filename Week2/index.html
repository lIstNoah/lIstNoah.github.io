<!DOCTYPE html>

<html lang="en">
    <head>
        <title>THE HTML SKELETON</title>
    </head>
    <body style="background-color: gold;">
        <h1 style="color: black; text-align: center; font-family: monospace;">THE RED AND GREEN BUTTON</h1>
        <section class="button-group">
            <button id="Red-Button" style="color: red;">Button</button>
            <button id="Green-Button" style="color: green;">Button</button>
        </section>
        <section class="arrow-btn-group">
            <button id="Red-Arrow" style="color: red;">←</button>
            <button id="Green-Arrow" style="color: green;">→</button>
        </section>
    </body>
</html>
