<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybergrid</title>
  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <nav>
    <button>Music</button>
    <button>World</button>
    <button>Fashion</button>
    <button>System</button>
  </nav>

  <h1>Cybergrid: Tron Inspo</h1>

  <div class="container">
    <div class="card">
      <div class="image">
        <img src="assets/daft_punk.jpg" alt="music">
      </div>
      <div class="content">
        <h2>Music</h2>
        <p>Daft Punk Inspired, futuristic sound design and song.</p>
      </div>
    </div>

    <div class="card">
      <div class="image">
        <img src="assets/cyber_punk_world.avif" alt="world">
      </div>
      <div class="content">
        <h2>Cyber World</h2>
        <p>Neon cities, infinite grids, flying cars, and tall skyscrapers in the night.</p>
      </div>
    </div>

    <div class="card">
      <div class="image">
        <img src="assets/cyberpunk_fashion.webp" alt="fashion">
      </div>
      <div class="content">
        <h2>Fashion</h2>
        <p>Explore possible fashion trends inspired by this reality.</p>
      </div>
    </div>

    <div class="card">
      <div class="image">
        <img src="assets/Cyberpunk_ai.jpg" alt="system">
      </div>
      <div class="content">
        <h2>System</h2>
        <p>AI networks controlling the digital realm.</p>
      </div>
    </div>
  </div>

</body>
</html>
